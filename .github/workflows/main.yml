name: School Timetable Bot

on:
  schedule:
    # 한국 시간 기준 아침 08:10 (UTC 23:10)
    - cron: '20 16 * * 0-4' 
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3에서 v4로 업데이트
      - name: Set up Python
        uses: actions/setup-python@v5 # v4에서 v5로 업데이트
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run Bot
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python 'bot.py' # 파일 이름을 bot.py로 바꾸셨다면 이대로 두세요!
